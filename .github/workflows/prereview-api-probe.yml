name: Probe PREreview API

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "scripts/prereview_api_probe.py"
      - ".github/workflows/prereview-api-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check requests
      - run: python scripts/prereview_api_probe.py
      - uses: actions/upload-artifact@v4
        with:
          name: prereview-api-probe
          path: data/prereview/probe/
          if-no-files-found: error
          retention-days: 2
